name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://user:password@localhost:5432/postgres
      DIRECT_URL: postgresql://user:password@localhost:5432/postgres
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      SUPABASE_ANON_KEY: ci-anon-key
      RATE_LIMIT_KEY_SECRET: ci-rate-limit-secret-with-at-least-32-chars
      ALLOWED_EMAIL_DOMAINS: uade.edu.ar

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck web
        run: npm run typecheck:web

      - name: Typecheck API
        run: npm run typecheck:api

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
